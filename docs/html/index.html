<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Grocery List</title>
        <link rel="shortcut icon" href="../img/apple.png">
        <link rel="stylesheet" href="../css/styles.css">
    </head>
    <body>
        <header>
            <h1>Grocery List</h1>
        </header>
        <main>
            <div>
                <form>
                    <label for="product-search">What would you like to add?</label>
                    <input type="text" id="product-search" placeholder="Apples...">
                    <button type="submit">Add</button>
                </form>
            </div>
            <div id="product-list">
                <p>You haven't added anything to your list yet!</p>
            </div>
        </main>
        <footer>
            <h2>Credits:</h2>
            <a href="https://www.flaticon.com/free-icons/fruit">Favicon by Freepik</a>
        </footer>
        <script src="../js/scripts.js"></script>
    </body>
</html>
